<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map — __TITLE__</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { height:100%; margin:0; font-family: sans-serif; }
    #map { height: 100vh; }

    #controlsTopRight {
      position: absolute; top: 4px; right: 4px; z-index: 1101;
      display: flex; flex-direction: column; gap: 5px;
    }
    #togglePanelBtn, #citySelector, #toggleAllBtn, #exportCsvBtn {
      padding: 4px 8px; background: #fff; border: 1px solid #aaa;
      cursor: pointer; font-size: 13px; border-radius: 3px;
    }

    #panel {
      position: absolute; top: 75px; right: 10px; width: 260px; max-height: calc(100% - 90px);
      background: #fff; border: 1px solid #aaa; padding: 10px; font-size: 13px;
      z-index: 1000; display: none; overflow-y: auto; border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }

    #legend { margin-top: 10px; display: none; border-top: 1px solid #ccc; padding-top: 10px; }
    #legendToggle { cursor: pointer; font-size: 11px; float: right; line-height: 1; margin-top: 8px; color: #555; }

    #loadingBadge {
      position: absolute; left: 6px; top: 6px; z-index: 1200;
      background: #111; color: #fff; font: 12px/1.3 monospace;
      padding: 4px 6px; border-radius: 6px; opacity: .9; display: none;
    }
    #bottomLeftStack {
      position: absolute; left: 10px; bottom: 28px; z-index: 1200;
      display: flex; flex-direction: column; gap: 0; align-items: flex-start;
    }
    #pointCount {
      background: rgba(255,255,255,.9); font: 12px/1.3 monospace;
      padding: 3px 6px; border-radius: 4px 4px 0 0; border: 1px solid #aaa;
      border-bottom: none;
    }
    #startupBrand {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.9); padding: 4px 6px;
      border-radius: 0 0 4px 4px; border: 1px solid #aaa;
    }
    #startupBrand img { height: 18px; width: auto; }
    #startupBrand a {
      color: #003366; text-decoration: none; font-size: 12px; line-height: 1;
    }

    .leaflet-top, .leaflet-bottom { z-index: 1201; }

    .north-arrow.leaflet-bar {
      background: rgba(255,255,255,.95); border: 1px solid #aaa; border-radius: 6px;
      width: 32px; height: 32px; display: flex; align-items: flex-end;
      justify-content: center; font: 700 13px/1 sans-serif;
    }
    .north-arrow.leaflet-bar::before {
      content: '▲'; position: absolute; top: 2px; font-size: 12px; color: #c00;
    }
  </style>
</head>
<body>

<div id="controlsTopRight">
  <select id="citySelector"><option value="All">All cities</option></select>
  <button id="togglePanelBtn">Filters</button>
</div>

  <div style="display:flex; gap:6px; align-items:center; margin-bottom:8px;">
    <button id="toggleAllBtn" title="Toggle all categories">Clear all</button>
    <button id="exportCsvBtn" style="margin-left:auto;">CSV</button>
  </div>
  <div id="categoriesList"></div>
  <div id="legendToggle" title="Show legend">legend ▾</div>
  <div id="legend"></div>
</div>

<script>
/* === Embedded data (injected by build_map.py) === */
var DATA = __GEOJSON_DATA__;
var BOUNDARIES = __BOUNDARY_DATA__;

/* === Helpers === */
function esc(s){
  return String(s||"").replace(/[&<>"']/g, function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
  });
}
function norm(s){
  return (s||"").normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}

/* === Leaflet map === */
var map = L.map('map', {
  zoomSnap: 0.25, zoomDelta: 0.25,
  wheelPxPerZoomLevel: 120, scrollWheelZoom: true
}).setView([51, 10], 4);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &amp; CARTO',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

L.control.scale({ position: 'bottomright', metric: true, imperial: false }).addTo(map);

var NorthCtrl = L.Control.extend({
  options: { position: 'bottomright' },
  onAdd: function(){
    var div = L.DomUtil.create('div','leaflet-control leaflet-bar north-arrow');
    div.title = 'North'; div.innerHTML = 'N';
    L.DomEvent.disableClickPropagation(div);
    return div;
  }
});
map.addControl(new NorthCtrl());

/* === Boundaries === */
var boundaryLayers = {};
var boundaryStyle = { color: '#007BFF', weight: 3, opacity: 1, fill: false };

if (BOUNDARIES && BOUNDARIES.features) {
  BOUNDARIES.features.forEach(function(feat){
    var city = (feat.properties||{}).city || '';
    var layer = L.geoJSON(feat, { style: boundaryStyle }).addTo(map);
    boundaryLayers[city] = layer;
  });
}

function zoomToCity(city){
  if (city === 'All') return;
  var layer = boundaryLayers[city];
  if (!layer) {
    var key = norm(city);
    var match = Object.keys(boundaryLayers).find(function(k){ return norm(k)===key; });
    if (match) layer = boundaryLayers[match];
  }
  if (layer) {
    var b = layer.getBounds();
    if (b && b.isValid()) map.fitBounds(b, { padding:[30,30] });
  }
}

/* === Points rendering === */
var geoLayer, allData = DATA;

function renderFeatures(selectedCategories, selectedCity){
  var filtered = allData.features.filter(function(f){
    var p = f.properties || {};
    return selectedCategories.indexOf(p.category) !== -1 &&
           (selectedCity === 'All' || norm(p.city) === norm(selectedCity));
  });

  if (geoLayer) map.removeLayer(geoLayer);
  geoLayer = L.geoJSON({ type:'FeatureCollection', features: filtered }, {
    pointToLayer: function(feature, latlng){
      var color = (feature.properties||{}).color || 'gray';
      return L.circleMarker(latlng, {
        radius:8, fillColor:color, color:'#000', weight:1.5, opacity:0.8, fillOpacity:0.7
      });
    },
    onEachFeature: function(feature, layer){
      var p = feature.properties || {};
      var html = '<b>'+esc(p.name||'No name')+'</b><br>'+
                 'City: '+esc(p.city||'-')+'<br>'+
                 'Category: '+esc((p.category||'-').replace(/_/g,' '));
      if (p.website) html += '<br>Web: <a href="'+esc(p.website)+'" target="_blank" rel="noopener">'+esc(p.website)+'</a>';
      layer.bindPopup(html);
    }
  }).addTo(map);

  document.getElementById('pointCount').textContent = filtered.length + ' places shown';

  if (selectedCity !== 'All') {
    zoomToCity(selectedCity);
  } else if (filtered.length) {
    var b = geoLayer.getBounds();
    if (b && b.isValid()) map.fitBounds(b, { padding:[30,30] });
  }
}

/* === UI setup === */
function setupUI(){
  var allCats = Array.from(new Set(
    allData.features.map(function(f){ return (f.properties||{}).category; }).filter(Boolean)
  )).sort();

  var cities = Array.from(new Set(
    allData.features.map(function(f){ return (f.properties||{}).city; }).filter(Boolean)
  )).sort();

  var catColors = {};
  allData.features.forEach(function(f){
    var p = f.properties||{};
    if (p.category && p.color) catColors[p.category] = p.color;
  });

  var catList = document.getElementById('categoriesList');
  var citySelector = document.getElementById('citySelector');
  var toggleAllBtn = document.getElementById('toggleAllBtn');

  catList.innerHTML = '';
  citySelector.innerHTML = '<option value="All">All cities</option>';

  cities.forEach(function(c){
    var opt = document.createElement('option');
    opt.value = c; opt.textContent = c; citySelector.appendChild(opt);
  });

  allCats.forEach(function(cat){
    var label = document.createElement('label');
    var display = cat.replace(/_/g,' ');
    label.innerHTML = '<input type="checkbox" value="'+esc(cat)+'" checked> '+esc(display);
    catList.appendChild(label);
    catList.appendChild(document.createElement('br'));
  });

  var legend = document.getElementById('legend');
  legend.innerHTML = '<strong>Legend:</strong><br>' +
    allCats.map(function(c){
      var col = catColors[c]||'gray';
      return '<span style="color:'+esc(col)+'">●</span> '+esc(c.replace(/_/g,' '));
    }).join('<br>');

  function debounce(fn, wait){
    var t; return function(){ clearTimeout(t); t=setTimeout(fn, wait); };
  }

  var updateMap = debounce(function(){
    var selected = Array.from(document.querySelectorAll('#categoriesList input[type=checkbox]'))
      .filter(function(c){ return c.checked; }).map(function(c){ return c.value; });
    renderFeatures(selected, citySelector.value);
  }, 120);

  var allSelected = true;
  toggleAllBtn.addEventListener('click', function(){
    allSelected = !allSelected;
    document.querySelectorAll('#categoriesList input[type=checkbox]').forEach(function(cb){ cb.checked = allSelected; });
    toggleAllBtn.textContent = allSelected ? 'Clear all' : 'Select all';
    updateMap();
  });

  catList.addEventListener('change', function(e){
    if (e.target && e.target.matches('input[type=checkbox]')) updateMap();
  });
  citySelector.addEventListener('change', updateMap);

  updateMap();
}

/* === Panel toggle === */
document.getElementById('togglePanelBtn').addEventListener('click', function(){
  var panel = document.getElementById('panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('legendToggle').addEventListener('click', function(){
  var legend = document.getElementById('legend');
  legend.style.display = legend.style.display === 'none' ? 'block' : 'none';
});

/* === CSV export === */
document.getElementById('exportCsvBtn').addEventListener('click', function(){
  var selectedCats = Array.from(document.querySelectorAll('#categoriesList input[type=checkbox]'))
    .filter(function(c){ return c.checked; }).map(function(c){ return c.value; });
  var selectedCity = document.getElementById('citySelector').value;

  var filtered = allData.features.filter(function(f){
    var p = f.properties||{};
    return selectedCats.indexOf(p.category)!==-1 &&
           (selectedCity==='All' || norm(p.city)===norm(selectedCity));
  });

  if (!filtered.length){ alert('No data to export.'); return; }

  var header = ['name','category','website','city','lat','lon'];
  var rows = [header];
  filtered.forEach(function(f){
    var p = f.properties||{};
    var c = (f.geometry&&f.geometry.coordinates)||[null,null];
    rows.push([p.name||'', p.category||'', p.website||'', p.city||'', c[1], c[0]]);
  });

  var csv = '\uFEFF' + rows.map(function(r){
    return r.map(function(v){ return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'; }).join(',');
  }).join('\n');

  var blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var d = new Date(), ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'-'+String(d.getHours()).padStart(2,'0')+'-'+String(d.getMinutes()).padStart(2,'0')+'-'+String(d.getSeconds()).padStart(2,'0');
  a.download = 'places-' + ds + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
});

/* === Init === */
setupUI();
</script>
</body>
</html>
